name: manifest

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "manifest.json"
      - "manifest.schema.json"
      - "SKILL.md"
      - "references/**"
      - "scripts/manifest/**"
      - ".github/workflows/manifest.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate manifest
        run: node scripts/manifest/validate.mjs
