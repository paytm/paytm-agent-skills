name: cli

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "bin/**"
      - "lib/**"
      - "package.json"
      - "manifest.json"
      - ".github/workflows/cli.yml"

jobs:
  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["18", "20", "22"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Validate manifest
        run: node scripts/manifest/validate.mjs
      - name: CLI version
        run: node bin/cli.mjs --version
      - name: CLI help
        run: node bin/cli.mjs help
      - name: CLI list-targets
        run: node bin/cli.mjs list-targets
      - name: Install --dry-run
        run: node bin/cli.mjs install --target codex --dry-run
      - name: Install + uninstall round-trip (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          export PAYTM_AGENT_SKILLS_INSTALL_DIR_CODEX=/tmp/paytm-agent-skills-test
          node bin/cli.mjs install --target codex
          # v2 multi-skill layout: routing manifest + per-skill folders at the bundle root
          test -f /tmp/paytm-agent-skills-test/SKILL.md
          test -f /tmp/paytm-agent-skills-test/manifest.json
          test -f /tmp/paytm-agent-skills-test/troubleshooting/SKILL.md
          test -f /tmp/paytm-agent-skills-test/troubleshooting/references/REFERENCE.md
          test -f /tmp/paytm-agent-skills-test/js-checkout/SKILL.md
          node bin/cli.mjs uninstall --target codex
          test ! -d /tmp/paytm-agent-skills-test
      - name: Install + uninstall round-trip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PAYTM_AGENT_SKILLS_INSTALL_DIR_CODEX = "$env:RUNNER_TEMP\paytm-agent-skills-test"
          node bin/cli.mjs install --target codex
          if (-not (Test-Path "$env:RUNNER_TEMP\paytm-agent-skills-test\SKILL.md")) { exit 1 }
          if (-not (Test-Path "$env:RUNNER_TEMP\paytm-agent-skills-test\manifest.json")) { exit 1 }
          if (-not (Test-Path "$env:RUNNER_TEMP\paytm-agent-skills-test\troubleshooting\SKILL.md")) { exit 1 }
          if (-not (Test-Path "$env:RUNNER_TEMP\paytm-agent-skills-test\troubleshooting\references\REFERENCE.md")) { exit 1 }
          if (-not (Test-Path "$env:RUNNER_TEMP\paytm-agent-skills-test\js-checkout\SKILL.md")) { exit 1 }
          node bin/cli.mjs uninstall --target codex
          if (Test-Path "$env:RUNNER_TEMP\paytm-agent-skills-test") { exit 1 }
