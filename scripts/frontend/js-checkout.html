<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Paytm Checkout</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      button {
        padding: 0.65rem 1.25rem;
        font-size: 1rem;
        cursor: pointer;
      }
      #status {
        margin-top: 1rem;
        color: #333;
        white-space: pre-wrap;
        font-size: 0.9rem;
      }
      .err {
        color: #a40000;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
      }
    </style>
  </head>
  <body>
    <h1>Paytm JS Checkout</h1>
    <p>
      Minimal trigger flow:
      <code>initiateTransaction</code> (server) → <code>txnToken</code> → <code>CheckoutJS.onLoad</code> →
      <code>init</code> → <code>invoke</code>.
    </p>

    <button type="button" id="payBtn" disabled>Pay with Paytm</button>
    <div id="status"></div>

    <script>
      var statusEl = document.getElementById("status");
      var payBtn = document.getElementById("payBtn");

      function setStatus(msg, isErr) {
        statusEl.textContent = msg;
        statusEl.className = isErr ? "err" : "";
      }

      // NOTE: This file is a static reference template. Keep changes minimal and follow Paytm docs.
      // Loader URL is provided by the backend as /paytm-client-config.json (public; no merchant key).
      fetch(new URL("paytm-client-config.json", document.baseURI).toString())
        .then(function (r) {
          return r.json();
        })
        .then(function (cfg) {
          if (!cfg.loader_url) {
            throw new Error("Missing loader_url (backend must provide mid + Paytm loader URL)");
          }
          var s = document.createElement("script");
          s.type = "application/javascript";
          s.src = cfg.loader_url;
          s.crossOrigin = "anonymous";
          s.onload = function () {
            window.dispatchEvent(new Event("paytm_checkoutjs_loaded"));
          };
          document.head.appendChild(s);
        })
        .catch(function (e) {
          setStatus(String(e.message || e), true);
        });

      window.addEventListener("paytm_checkoutjs_loaded", function () {
        payBtn.disabled = false;
        setStatus("CheckoutJS loaded. Click to call /paytm/create-order then init/invoke.");
      });

      payBtn.addEventListener("click", function () {
        setStatus("Requesting txnToken from server…");
        payBtn.disabled = true;

        fetch(new URL("paytm/create-order", document.baseURI).toString(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ amount: "1.00", custId: "CUST_CHECKOUT" }),
        })
          .then(function (r) {
            if (!r.ok) {
              return r.text().then(function (t) {
                throw new Error("HTTP " + r.status + " — " + t);
              });
            }
            return r.json();
          })
          .then(function (data) {
            var orderId = data.orderId;
            var txnToken = data.txnToken;
            var amt = data.amount;

            if (!window.Paytm || !window.Paytm.CheckoutJS) {
              throw new Error("Paytm.CheckoutJS not available — loader may have failed");
            }

            // IMPORTANT: do NOT wrap init/invoke in CheckoutJS.onLoad() here.
            // onLoad fires ONCE when the script first loads — by the time the user
            // clicks Pay, it has already fired and the callback will never run.
            // CheckoutJS is already ready at this point (we set payBtn.disabled=false
            // from the script's onload above), so call init/invoke directly.
            var config = {
              root: "",
              flow: "DEFAULT",
              data: {
                orderId: orderId,
                token: txnToken,
                tokenType: "TXN_TOKEN",
                amount: amt,
              },
              merchant: { redirect: false },
              handler: {
                notifyMerchant: function (eventName, data) {
                  // Fired for lifecycle events (APP_CLOSED, SESSION_EXPIRED, etc.)
                  if (eventName === "APP_CLOSED") {
                    setStatus("Payment cancelled by user.", true);
                    payBtn.disabled = false;
                  } else if (eventName === "SESSION_EXPIRED") {
                    setStatus("Session expired (txnToken TTL). Please retry.", true);
                    payBtn.disabled = false;
                  }
                },
                transactionStatus: function (data) {
                  // data.STATUS: TXN_SUCCESS / TXN_FAILURE / PENDING
                  // ALWAYS reconfirm via /paytm/order-status before fulfilling.
                  if (data && data.STATUS === "TXN_SUCCESS") {
                    setStatus("Payment successful. orderId=" + orderId);
                  } else if (data && data.STATUS === "PENDING") {
                    setStatus("Payment pending — we'll confirm shortly.");
                  } else {
                    setStatus("Payment failed: " + (data && data.RESPMSG ? data.RESPMSG : "unknown error"), true);
                  }
                  window.Paytm.CheckoutJS.close();
                  payBtn.disabled = false;
                },
              },
            };

            return window.Paytm.CheckoutJS.init(config).then(function () {
              window.Paytm.CheckoutJS.invoke();
              setStatus("Checkout invoked. orderId=" + orderId);
            });
          })
          .catch(function (e) {
            setStatus(String(e.message || e), true);
            payBtn.disabled = false;
          });
      });
    </script>
  </body>
</html>
