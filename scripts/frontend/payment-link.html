<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paytm Payment Link</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 42rem; margin: 2rem auto; padding: 0 1rem; }
      label { display: block; margin: 0.5rem 0 0.25rem; font-size: 0.9rem; color: #444; }
      input { width: 100%; padding: 0.5rem; font-size: 1rem; box-sizing: border-box; }
      button { margin-top: 1rem; padding: 0.65rem 1.25rem; font-size: 1rem; cursor: pointer; }
      #result { margin-top: 1.5rem; padding: 0.75rem 1rem; border-radius: 0.4rem; display: none; }
      #result.success { background: #e7f6e7; color: #1b5e20; display: block; }
      #result.failure { background: #fdecea; color: #a40000; display: block; }
      #result a { color: inherit; word-break: break-all; }
    </style>
  </head>
  <body>
    <h1>Generate a Paytm Payment Link</h1>
    <p>
      Server calls <code>/paytm/create-link</code> → Paytm returns a short URL you can
      share via SMS / WhatsApp / email. The customer pays on a Paytm-hosted page.
    </p>

    <label>Amount (INR)</label>
    <input id="amount" type="number" step="0.01" min="1" value="499.00" />
    <label>Customer name</label>
    <input id="name" type="text" placeholder="Buyer Name" />
    <label>Customer mobile (10 digits)</label>
    <input id="mobile" type="tel" placeholder="9999999999" />
    <label>Customer email</label>
    <input id="email" type="email" placeholder="buyer@example.com" />
    <label>Description (alphanumerics + spaces, ≥ 3 chars)</label>
    <input id="desc" type="text" value="Invoice payment" />

    <button type="button" id="createBtn">Create payment link</button>
    <div id="result" role="status" aria-live="polite"></div>

    <script>
      var resultEl = document.getElementById("result");

      function showResult(kind, html) {
        resultEl.className = kind;
        resultEl.innerHTML = html;
      }

      document.getElementById("createBtn").addEventListener("click", function () {
        var amount = document.getElementById("amount").value;
        var customerName = document.getElementById("name").value;
        var customerMobile = document.getElementById("mobile").value;
        var customerEmail = document.getElementById("email").value;
        var linkDescription = document.getElementById("desc").value;

        showResult("", "Creating link…");
        resultEl.style.display = "block";

        fetch(new URL("paytm/create-link", document.baseURI).toString(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            amount: amount,
            linkName: linkDescription,
            linkDescription: linkDescription,
            customerName: customerName,
            customerMobile: customerMobile,
            customerEmail: customerEmail,
            sendSms: !!customerMobile,
            sendEmail: !!customerEmail,
          }),
        })
          .then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error("HTTP " + r.status + " — " + t); });
            return r.json();
          })
          .then(function (data) {
            console.log("[paytm] link created", data);
            var url = data.shortUrl || data.longUrl || "";
            showResult("success",
              "Link created. <strong>linkId:</strong> " + data.linkId +
              "<br><strong>URL:</strong> <a href=\"" + url + "\" target=\"_blank\">" + url + "</a>" +
              (data.shortUrl && (customerMobile || customerEmail)
                ? "<br><em>Paytm is dispatching the link via SMS / email if templates are approved on your MID.</em>"
                : ""));
          })
          .catch(function (e) {
            console.error("[paytm] link error", e);
            showResult("failure", "Could not create link: " + (e.message || e));
          });
      });
    </script>
  </body>
</html>
